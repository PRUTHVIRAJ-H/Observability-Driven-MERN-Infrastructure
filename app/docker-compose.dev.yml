version: "3.8"

services:
  client:
    build:
      context: ./client
      dockerfile: Dockerfile.client.dev
    environment:
      - REACT_APP_PORT=3000
      - CHOKIDAR_USEPOLLING=true
    ports:
      - "3000:3000"
    volumes:
      - ./client/src:/app/client/src
    command: npm run start
    stdin_open: true
    tty: true

  server:
    build:
      context: ./server
      dockerfile: Dockerfile.server.dev
    environment:
      - MONGO_URI=mongodb://db:27017/telemetry_db
      - PORT=4000
    ports:
      - "4000:4000"
    volumes:
      - ./server/src:/app/server/src
    depends_on:
      - db

  db:
    image: mongo
    ports:
      - "27017:27017"
    restart: always

  prometheus:
    image: prom/prometheus
    container_name: prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9000:9090" # Your Blueprint: Port 9000
    depends_on:
      - server

  grafana:
    image: grafana/grafana
    container_name: grafana
    ports:
      - "5000:3000" # Your Blueprint: Port 5000
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - prometheus
