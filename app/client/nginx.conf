user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 8000;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Performance optimizations
    sendfile on;
    tcp_nopush on;
    keepalive_timeout 20;
    gzip on;
    gzip_comp_level 5;
    gzip_types text/plain text/css application/javascript application/json;

    server {
        # 1. Matches your Port 3000 Blueprint
        listen 3000 default_server;
        root /usr/share/nginx/html;
        index index.html;

        # 2. Support for React Routing (Refreshes won't 404)
        location / {
            try_files $uri /index.html;
        }

        # 3. Bridge to the Brain (Node.js API)
        # This handles /user, /user/add, etc.
        location /user {
            proxy_pass http://server:4000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # 4. Telemetry Portal (For Prometheus)
        location /metrics {
            proxy_pass http://server:4000/metrics;
        }
    }
}
